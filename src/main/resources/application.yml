spring:
  application:
    name: ai-first-crm
  security:
    user:
      name: local-dev
      password: local-dev-pass
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ai_first_crm}
    username: ${DB_USER:crm_user}
    password: ${DB_PASSWORD:crm_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

ai:
  service:
    enabled: ${AI_SERVICE_ENABLED:true}
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8090}
    timeout-ms: ${AI_SERVICE_TIMEOUT_MS:3000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
