services:
  postgres:
    image: postgres:16
    container_name: ai-first-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_first_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d ai_first_crm"]
      interval: 5s
      timeout: 3s
      retries: 20

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-first-crm-ai-service
    restart: unless-stopped
    env_file:
      - ./ai-service/.env.example
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
